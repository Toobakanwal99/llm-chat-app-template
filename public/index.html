<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>LLM Chat App</title>
		<style>
			:root {
				--primary-color: #f6821f;
				--primary-hover: #e67e22;
				--light-bg: #f9fafb;
				--border-color: #e5e7eb;
				--text-color: #1f2937;
				--text-light: #6b7280;
				--user-msg-bg: #fff2e6;
				--assistant-msg-bg: #ffffff;
				--link-color: #f6821f;
				--link-hover: #e67e22;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
				line-height: 1.6;
				color: var(--text-color);
				max-width: 800px;
				margin: 0 auto;
				padding: 1rem;
				background-color: #fafafa;
			}

			header {
				text-align: center;
				margin-bottom: 1.5rem;
				padding: 1rem 0;
				border-bottom: 1px solid var(--border-color);
				position: relative;
			}

			h1 {
				font-size: 1.5rem;
				color: var(--primary-color);
			}

			header p {
				color: var(--text-light);
				font-size: 0.9rem;
				margin-bottom: 0.75rem;
			}

			.utility-controls {
				display: flex;
				justify-content: center;
				gap: 0.5rem;
			}

			.btn-secondary {
				background: white;
				border: 1px solid var(--border-color);
				color: var(--text-color);
				padding: 0.35rem 0.75rem;
				font-size: 0.85rem;
				border-radius: 6px;
				cursor: pointer;
				transition: all 0.2s;
			}

			.btn-secondary:hover {
				background: var(--light-bg);
				border-color: #cbd5e1;
			}

			.chat-container {
				display: flex;
				flex-direction: column;
				height: calc(100vh - 220px);
				min-height: 450px;
				border: 1px solid var(--border-color);
				border-radius: 12px;
				overflow: hidden;
				background-color: white;
				box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
			}

			.chat-messages {
				flex: 1;
				overflow-y: auto;
				padding: 1.25rem;
				background-color: var(--light-bg);
				display: flex;
				flex-direction: column;
				gap: 1rem;
			}

			.message {
				padding: 0.75rem 1rem;
				border-radius: 12px;
				max-width: 85%;
				width: fit-content;
				box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
			}

			.message p {
				white-space: pre-line;
				margin: 0;
				overflow-wrap: break-word;
			}

			/* Message content wrapper for hyperlinks */
			.message-content {
				white-space: pre-line;
				overflow-wrap: break-word;
			}

			.user-message {
				background-color: var(--user-msg-bg);
				align-self: flex-end;
				border-bottom-right-radius: 2px;
				color: #4a2700;
			}

			.assistant-message {
				background-color: var(--assistant-msg-bg);
				align-self: flex-start;
				border-bottom-left-radius: 2px;
				border: 1px solid var(--border-color);
			}

			/* Hyperlink styles */
			.chat-link {
				color: var(--link-color);
				text-decoration: none;
				border-bottom: 1px solid transparent;
				transition: all 0.2s ease;
				font-weight: 500;
			}

			.chat-link:hover {
				color: var(--link-hover);
				border-bottom-color: var(--link-hover);
				text-decoration: none;
			}

			.user-message .chat-link {
				color: #e67e22;
				border-bottom-color: rgba(230, 126, 34, 0.3);
			}

			.user-message .chat-link:hover {
				color: #d35400;
				border-bottom-color: #d35400;
			}

			/* Code block styling */
			.message-content pre {
				background: #f3f4f6;
				padding: 0.75rem;
				border-radius: 6px;
				overflow-x: auto;
				margin: 0.5rem 0;
				font-size: 0.85rem;
				border: 1px solid var(--border-color);
			}

			.message-content code {
				background: #f3f4f6;
				padding: 0.2rem 0.4rem;
				border-radius: 4px;
				font-family: 'Courier New', Consolas, monospace;
				font-size: 0.85rem;
			}

			.user-message .message-content pre,
			.user-message .message-content code {
				background: rgba(243, 244, 246, 0.8);
			}

			/* Blockquote styling */
			.message-content blockquote {
				border-left: 3px solid var(--primary-color);
				margin: 0.5rem 0;
				padding-left: 1rem;
				color: var(--text-light);
				font-style: italic;
			}

			/* List styling */
			.message-content ul, 
			.message-content ol {
				margin: 0.5rem 0;
				padding-left: 1.5rem;
			}

			.message-content li {
				margin: 0.25rem 0;
			}

			.message-input {
				display: flex;
				align-items: flex-end;
				padding: 0.75rem;
				border-top: 1px solid var(--border-color);
				background-color: white;
			}

			#user-input {
				flex: 1;
				padding: 0.75rem;
				border: 1px solid var(--border-color);
				border-radius: 6px;
				font-family: inherit;
				font-size: 1rem;
				resize: none;
				min-height: 44px;
				max-height: 150px;
				outline: none;
			}

			#user-input:focus {
				border-color: var(--primary-color);
				box-shadow: 0 0 0 2px rgba(246, 130, 31, 0.15);
			}

			#send-button {
				margin-left: 0.5rem;
				padding: 0 1.25rem;
				height: 44px;
				background-color: var(--primary-color);
				color: white;
				border: none;
				border-radius: 6px;
				font-weight: 600;
				cursor: pointer;
				transition: background-color 0.2s;
			}

			#send-button:disabled {
				background-color: #d1d5db;
				color: #9ca3af;
				cursor: not-allowed;
			}

			.typing-indicator {
				display: none;
				align-self: flex-start;
				font-style: italic;
				color: var(--text-light);
				font-size: 0.875rem;
				padding: 0.5rem 1rem;
				background: #f3f4f6;
				border-radius: 12px;
			}

			.typing-indicator.visible {
				display: block;
			}

			/* --- ChatGPT style History List Modal --- */
			.modal-overlay {
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 0, 0, 0.4);
				backdrop-filter: blur(4px);
				z-index: 1000;
				justify-content: center;
				align-items: center;
			}
			.modal-overlay.active {
				display: flex;
			}
			.modal-box {
				background: white;
				padding: 1.5rem;
				border-radius: 12px;
				width: 90%;
				max-width: 500px;
				max-height: 70vh;
				display: flex;
				flex-direction: column;
			}
			.modal-header {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 1rem;
				border-bottom: 1px solid var(--border-color);
				padding-bottom: 0.5rem;
			}
			.modal-body {
				flex: 1;
				overflow-y: auto;
				margin-bottom: 1rem;
			}
			.history-session-item {
				padding: 0.75rem;
				border: 1px solid var(--border-color);
				border-radius: 8px;
				margin-bottom: 0.5rem;
				background: var(--light-bg);
				cursor: pointer;
				transition: all 0.2s;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}
			.history-session-item:hover {
				border-color: var(--primary-color);
				background: #fffdfa;
			}
			.session-title {
				font-weight: 600;
				font-size: 0.9rem;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				flex: 1;
			}
			.session-date {
				font-size: 0.75rem;
				color: var(--text-light);
				margin-left: 0.5rem;
			}

			footer {
				margin-top: 1.5rem;
				text-align: center;
				font-size: 0.85rem;
				color: var(--text-light);
			}

			/* Scrollbar styling */
			::-webkit-scrollbar {
				width: 8px;
				height: 8px;
			}

			::-webkit-scrollbar-track {
				background: var(--light-bg);
				border-radius: 4px;
			}

			::-webkit-scrollbar-thumb {
				background: var(--border-color);
				border-radius: 4px;
			}

			::-webkit-scrollbar-thumb:hover {
				background: var(--text-light);
			}

			/* Responsive design */
			@media (max-width: 640px) {
				.message {
					max-width: 95%;
				}
				
				body {
					padding: 0.5rem;
				}
				
				.chat-container {
					height: calc(100vh - 180px);
				}
			}
		</style>
	</head>
	<body>
		<header>
			<h1>Cloudflare AI Chat</h1>
			<p>Powered by Cloudflare Workers AI</p>
			<div class="utility-controls">
				<button id="history-button" class="btn-secondary">📜 Past Conversations</button>
				<button id="new-chat-button" class="btn-secondary">➕ New Chat</button>
			</div>
		</header>

		<div class="chat-container">
			<div id="chat-messages" class="chat-messages">
				<div class="typing-indicator" id="typing-indicator">
					AI is thinking...
				</div>
			</div>

			<div class="message-input">
				<textarea id="user-input" placeholder="Type your message here..." rows="1" autofocus></textarea>
				<button id="send-button">Send</button>
			</div>
		</div>

		<div id="history-modal" class="modal-overlay">
			<div class="modal-box">
				<div class="modal-header">
					<h3>Saved Conversations</h3>
					<button id="close-history" class="btn-secondary">✕ Close</button>
				</div>
				<div id="history-log-body" class="modal-body">
					</div>
			</div>
		</div>

		<footer>
			<p>Cloudflare Workers AI Chat Template &copy; 2026</p>
		</footer>

		<script src="chat.js"></script>
	</body>
</html>
